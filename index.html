<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Productivity Eye</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #f5820d; --text: #e0e0e0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { background: var(--card); width: 100%; max-width: 550px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: var(--accent); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #888; }
        input, textarea { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; font-size: 14px; }
        textarea { height: 80px; resize: none; }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #444; cursor: not-allowed; }
        #output { margin-top: 20px; padding: 15px; background: #111; border-radius: 8px; font-size: 14px; line-height: 1.6; border-left: 4px solid var(--accent); white-space: pre-wrap; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: #555; }
        .online { background: #4CAF50; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>👁️ AI Productivity Eye</h2>
    
    <div class="input-group">
        <label>Gemini API Key (Required for Brain)</label>
        <input type="password" id="geminiKey" placeholder="Enter your Gemini API Key...">
    </div>

    <div class="input-group">
        <label>Productivity Prompt</label>
        <textarea id="userPrompt">Analyze this screen and tell me what my next logical step should be based on my current work.</textarea>
    </div>

    <button id="mainBtn">Analyze Screen & Log to Firebase</button>

    <div id="output">System ready. Capture a screen to begin.</div>
    
    <p style="font-size: 11px; color: #555; text-align: center; margin-top: 20px;">
        Database Status: <span id="dbStatus" class="status-dot"></span> Firebase Connected
    </p>
</div>

<script type="module">
    // Load SDKs via CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // 1. YOUR FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyCIhojT1nuNGvu4i1b5qPgtu9T00uUaxRo",
        authDomain: "coll-45ab0.firebaseapp.com",
        projectId: "coll-45ab0",
        storageBucket: "coll-45ab0.firebasestorage.app",
        messagingSenderId: "778366611173",
        appId: "1:778366611173:web:a864098c36722a94f0ee0c"
    };

    // Initialize Firebase & Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    document.getElementById('dbStatus').classList.add('online');

    const mainBtn = document.getElementById('mainBtn');
    const output = document.getElementById('output');

    mainBtn.onclick = async () => {
        const geminiKey = document.getElementById('geminiKey').value;
        const prompt = document.getElementById('userPrompt').value;

        if (!geminiKey) return alert("Please enter your Gemini API Key first!");

        try {
            mainBtn.disabled = true;
            output.innerText = "📸 Requesting screen access...";

            // 2. CAPTURE SCREEN
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // Stop sharing
            stream.getTracks().forEach(track => track.stop());
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

            // 3. AI ANALYSIS (GEMINI)
            output.innerText = "🧠 AI is processing your screen...";
            const genAI = new GoogleGenerativeAI(geminiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const result = await model.generateContent([
                prompt,
                { inlineData: { data: base64Image, mimeType: "image/jpeg" } }
            ]);
            const responseText = await result.response.text();
            output.innerText = responseText;

            // 4. LOG TO FIREBASE
            await addDoc(collection(db, "productivity_history"), {
                query: prompt,
                response: responseText,
                created_at: serverTimestamp()
            });

        } catch (err) {
            output.innerText = "❌ Error: " + err.message;
        } finally {
            mainBtn.disabled = false;
        }
    };
</script>

</body>
</html>
