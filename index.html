<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Local AI Eye (No API Key)</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #status { font-size: 12px; color: #888; margin-bottom: 10px; }
        textarea { width: 100%; background: #2d2d2d; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #6200ee; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; cursor: wait; }
        #output { margin-top: 20px; padding: 15px; background: #2d2d2d; border-radius: 8px; min-height: 100px; line-height: 1.5; border-left: 4px solid #6200ee; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Local Screen AI</h2>
    <div id="status">Loading AI Engine...</div>
    
    <textarea id="prompt" rows="3">Describe what is on my screen in detail.</textarea>
    <button id="btn" disabled>Wait for Engine...</button>
    
    <div id="output">The AI response will appear here after analysis.</div>
</div>

<canvas id="canvas"></canvas>

<script type="module">
    // Import Transformers.js for local browser-based AI
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

    const status = document.getElementById('status');
    const btn = document.getElementById('btn');
    const output = document.getElementById('output');
    const canvas = document.getElementById('canvas');

    let vlm_pipeline;

    // 1. Load the model locally using WebGPU
    async function init() {
        try {
            status.innerText = "Downloading AI (approx 600MB)... please wait.";
            vlm_pipeline = await pipeline('image-to-text', 'Xenova/moondream2', {
                device: 'webgpu', // Uses your GPU for speed
            });
            status.innerText = "AI Engine Ready (Local)";
            btn.disabled = false;
            btn.innerText = "Analyze My Screen";
        } catch (e) {
            status.innerText = "WebGPU not supported. Trying CPU (Slower)...";
            vlm_pipeline = await pipeline('image-to-text', 'Xenova/moondream2');
            status.innerText = "AI Engine Ready (Local CPU)";
            btn.disabled = false;
        }
    }

    btn.onclick = async () => {
        try {
            btn.disabled = true;
            output.innerText = "Select a screen/window to capture...";

            // 2. Capture Screen
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // Stop screen sharing immediately
            stream.getTracks().forEach(track => track.stop());
            const dataURL = canvas.toDataURL('image/png');

            // 3. Run AI Locally
            output.innerText = "AI is thinking locally on your GPU...";
            const result = await vlm_pipeline(dataURL, document.getElementById('prompt').value);
            
            output.innerText = result[0].generated_text;
        } catch (err) {
            output.innerText = "Error: " + err.message;
        } finally {
            btn.disabled = false;
        }
    };

    init();
</script>

</body>
</html>
